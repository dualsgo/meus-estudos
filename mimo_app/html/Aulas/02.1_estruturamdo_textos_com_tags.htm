<!-- MIMO 02 - Estruturando texto com tags -->

<!-- 02.1 - Quebras de linha, ênfase e importância  -->

<!-- Às vezes, queremos formatar parágrafos com quebras de linha. Podemos separar linhas com a ajuda da tag de quebra de linha: br. -->

<h1>My favorite things</h1>
<p>
    Raindrops on roses<br>
    Whiskers on kittens<br>
    Bright copper kettles<br>
    Warm woolen mittens
</p>

<!-- <br> é uma tag vazia. Tags vazias não têm tag de fechamento e nem conteúdo. Elas também são chamadas de tags auto-fechadas. -->

<!-- Existe um elemento para dar ênfase ao texto, ele o torna itálico. É chamado de elemento em. Adicione <em> e </em>. -->

<!-- Para definir textos como importantes, usamos as tags <strong> e </strong>. Isso faz com que o texto fique negrito. -->

<p>
    Raindrops on <em>roses</em><br>
    Whiskers on <strong>kittens</strong><br>
    Bright copper kettles<br>
    Warm woolen mittens
</p>

<!-- Tags semaânticas são tags que têm um significado especial. Elas são usadas para descrever o conteúdo de uma página web. Por exemplo, <strong> e <em> são tags semânticas, enquanto <b> e <i> não são. Visualmente, eles são iguais. -->
