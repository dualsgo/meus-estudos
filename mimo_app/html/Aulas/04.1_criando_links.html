<!-- MIMO 04 - Criando Links -->

<!-- 04.1 - Links e Atributos -->

<!-- Vamos dar uma olhada em como os links funcionam para combinar páginas da web em sites. Para começar a criar um link, adicionamos o texto entre as tags <a> e </a>. Isso ainda não destacará o texto. <a> significa tag "Anchor". -->

<a>Learn to Code</a>

<!-- Para vincular o texto a uma página da web, adicionamos href="" junto com um Localizador Uniforme de Recursos (URL). href é a abreviação de "referência de hipertexto". -->

 <a href="https://mimo.org">Learn to Code</a>

 <!--
 href é um atributo. Todos os atributos têm duas coisas em comum: eles fornecem informações extras e vão dentro da tag de abertura.

 Os atributos são adicionados após o nome da tag e antes do sinal de fechamento >.
 
 Nós vinculamos a uma página da web adicionando = após o atributo e uma URL como valor entre aspas.
 -->
