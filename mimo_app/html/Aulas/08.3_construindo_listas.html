<!-- MIMO 08 - Construindo Listas -->

<!-- 08.1 - Listas aninhadas -->

<!-- 
Os itens da lista podem conter mais do que apenas texto. Eles também podem conter imagens ou links.

Os itens da lista podem até conter outras listas. Para criar uma lista aninhada, começamos com uma lista não ordenada simples e um item de lista.

Para finalizar a lista aninhada, adicionamos uma lista ordenada ou não ordenada como o conteúdo de um item da lista.
-->

<!doctype html>
<html>
 <body>
  <ul>
   <li>Best Comic Book Movies:
    <ol>
     <li>The Dark Knight</li>
     <li>Spider-Man 2</li>
     </ol>
     <li>Links
        <ul>
        <li><a href="https://www.imdb.com/title/tt0468569/">The Dark Knight</a></li>
        <li><a href="https://www.imdb.com/title/tt0316654/">Spider
     </ul>
     </li>
   </li>
  </ul>
 </body>
</html>
