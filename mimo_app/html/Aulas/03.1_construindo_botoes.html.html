<!-- MIMO 03 - Constuindo botões -->

<!-- 03.1 - Botões -->

<!-- Com botões, programas alteram páginas da web com base no comportamento do usuário. Por exemplo, clicar em Próximo pode executar um código que percorre os caracteres. -->

<!-- Para criar um botão que os usuários possam clicar, precisamos das tags de abertura <button> e fechamento </button>. -->

<p>Subscribe to our Newsletter</p>
<button>Subscribe</button>

<!-- Podemos fazer textos aparecerem em um botão digitando-os entre as tags. Tente digitar Login entre as tags do botão. -->

<h1>Facebook</h1>
<p>Log in to your account to get started</p>
<button>Login</button>

<!-- Anteriormente, aprendemos como enfatizar ou tornar o texto importante. Podemos também usar essas tags para o texto dentro de um botão. -->

<h3>Warning</h3>
<p>This site contains humor that may cause uncontrollable laughter</p>
<button><strong>Continue anyway</strong></button>

<!-- Os botões são exibidos lado a lado, mesmo que estejam em linhas de código separadas. Coloque esses botões exibindo First, Second e depois Third. -->

<button>First</button>
<button>Second</button>
<button>Third</button>

<!-- Se quisermos que os botões fiquem empilhados um sobre o outro, podemos usar a tag <br> para colocar cada botão em uma nova linha. -->

<h3>Stack of Pancakes</h3>
<p>Log in or sign up to view the best photos of pancakes across the globe.</p>
<button>Login</button>
<br>
<button>Sign up</button>
