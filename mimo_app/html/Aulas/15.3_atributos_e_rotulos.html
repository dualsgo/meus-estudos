<!-- 15.3 - Atributos e rótulos de formulário -->

<!-- Em formulários, labels são importantes para definir as entradas esperadas. Preencha label no espaço em branco. 
 
Criamos um rótulo usando as tags <label> e </label>. Adicionamos texto aos labels para ajudar os usuários a saberem o que inserir. Adicione Email como o texto após a segunda tag label. 
O atributo for especifica a qual elemento input um label está vinculado. Seu valor é o mesmo que o valor do id do elemento input.
-->

<label for="email">Email</label>
<input id="email" type="email" placeholder="e-mail">

<!-- O valor do atributo for deve ser o mesmo que o valor do id do elemento de entrada correspondente. Os rótulos também ajudam com a acessibilidade. Leitores de tela irão ler em voz alta rótulos como Name: ou Email: quando o elemento input estiver em foco. Podemos usar atributos placeholder dentro de campos de entrada para funcionar como rótulos. No entanto, isso não é uma substituição completa para rótulos.-->
