<!-- MIMO 06 - Coletando Input -->

<!-- 06.1 - Entrada -->

<!-- Em HTML, usamos o elemento input para obter todos os tipos de entrada do usuário, como emails, senhas, datas e mais. Vamos aprender a usar a entrada do usuário em um site mais tarde. Por enquanto, vamos nos concentrar em criar o elemento e definir seus atributos. -->

<!-- Criamos elementos de entrada usando a tag vazia <input>. O atributo placeholder sugere o que um usuário deve digitar no campo.-->

<!-- Assim como botões, elementos de input precisam de uma tag <br> para colocar um abaixo do outro.
 
O atributo type especifica o tipo de entrada. Por exemplo, podemos ocultar o que os usuários digitam para melhor segurança com type="password".

O valor padrão para o tipo é text, o que permite que os usuários insiram texto que podem ver.

Não há necessidade de memorizar todos os tipos de input. Vamos te dar prática para os mais interessantes, como range, checkbox, date e color.
-->

<input type="text" placeholder="Digite seu nome">
<br>
<input type="password" placeholder="Digite sua senha">
<br>
<input type="email" placeholder="Digite seu email">
<br>
<input type="date">
<br>
<input type="color" value="#ff0000">
<br>
<input type="range" min="0" max="100">
<br>
<input type="checkbox" value="Teste">Teste
<br>
<input type="radio" value="Teste">Teste
<br>
<input type="submit">
