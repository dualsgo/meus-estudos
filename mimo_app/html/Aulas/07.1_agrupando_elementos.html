<!-- MIMO 07 - Agrupando elementos -->

<!-- 07.1 - Contêineres -->

<!--
Desenvolvedores agrupam elementos relacionados em grupos para criar layouts únicos para seus sites, como o abaixo.

Para criar um grupo de elementos, nós envolvemos os elementos com as tags <div> e </div>.

As tags <div></div> e os elementos entre elas formam um grupo em uma página da web. <div> é a abreviação de divisão.

Chamamos elementos dentro de outros elementos de elementos aninhados, por exemplo, aninhando <h1>Top Story</h1> dentro de <div></div>.
-->
<div>
    <h1>Top Story</h1>
</div>

<!-- Crie um grupo de elementos para o cabeçalho e um grupo de elementos para os elementos <img>, <br> e <button>, usando <div> e </div>. -->

<div>
    <h4>Instapolaroid</h4>
</div>
<div>
    <img src="https://www.wikipedia.org/static/images/project-logos/enwiki.png" alt="Logo Wikipedia">
    <br>
    <button>Like</button>
    <button>Coment</button>
</div>
