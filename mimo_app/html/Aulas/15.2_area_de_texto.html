<!-- 15.2 - Área de texto -->

<!-- Os sites ganham vida com a interação do usuário: quando os visitantes adicionam comentários, enviam mensagens ou compartilham postagens com seus amigos. Nós aprendemos brevemente que podemos obter a entrada do usuário com o elemento input. Vamos entrar em mais detalhes. Por enquanto, codifique um input no form.
 
Para texto, definimos o atributo type como "text" para fazer o elemento input um campo de texto.

  Elementos input podem ser apenas campos de texto com uma única linha. Para criar uma área de texto com várias linhas, usamos o elemento textarea.-->


<h1>Leave a Review</h1>
<textarea></textarea>
<br><br>
Digite algo: <input type="text" placeholder="Digite algo...">
<br><br>
<!-- Para controlar o tamanho da área de texto, usamos o atributo rows para definir as linhas de texto e o atributo cols para definir o número de caracteres. -->
 
<textarea placeholder="Digite algo..."></textarea>
