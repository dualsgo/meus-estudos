<!-- MIMO 08 - Construindo Listas -->

<!-- 08.1 - Listas ordenadas -->

 <!--
Listas em HTML são muito parecidas com listas de compras ou de tarefas. Elas são uma excelente ferramenta para organizar informações em uma página da web.
  
Um tipo de lista é uma lista ordenada.

Uma lista ordenada exibe uma lista de itens numerados. Como os resultados de uma corrida.

Uma lista ordenada é feita com as tags <ol> e </ol>. A letra O significa "ordered" e a letra L significa "list".

Para adicionar um item de lista, colocamos o texto entre as tags <li> e </li>. Neste caso, o L significa "list" e o I significa "item".

Para que as listas sejam exibidas corretamente, os itens da lista precisam estar dentro do elemento de lista ordenada. Listas podem ter qualquer número de itens. 
 -->
<h1>Race Result.</h1>
 <ol>
    <li>Tortoise</li>
    <li>Hare</li>
 </ol>
