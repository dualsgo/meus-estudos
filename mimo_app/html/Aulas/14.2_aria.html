<!-- 14.2 - ARIA -->

<!-- Você acabou de aprender por que é importante usar as tags HTML apropriadas ou, se não pudermos usá-las, os papéis ARIA apropriados. Vamos aprender sobre mais um atributo e como usar os atributos ARIA corretamente.-->

<!-- Às vezes, incluímos conteúdo visualmente atraente que pode distrair leitores de tela. Nesses casos, podemos usar o atributo aria-hidden. Quando leitores de tela passam por elementos com o atributo aria-hidden, eles não leem seu conteúdo para o usuário.
 
 Devemos não usar aria-hidden em elementos interativos, como 
botões ou links, porque os usuários não poderão interagir com eles.-->

<!-- Precisamos garantir que estamos usando funções ARIA quando precisamos delas. Por exemplo, esse papel de "banner" está interferindo com o verdadeiro propósito do ul, que é mostrar uma lista. Portanto, não devemos codificá-lo aqui.-->
