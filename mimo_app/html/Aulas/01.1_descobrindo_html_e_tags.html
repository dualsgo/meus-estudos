<!-- MIMO 01 - Noções básicas de HTML -->

<!-- 01.1 - Descobrindo HTML e tags -->

<!-- HTML, Hipertext Markup Language, é uma linguagem de marcação que é usada para criar páginas web. -->

<!-- Tags são elementos que são usados para marcar o conteúdo de uma página web. -->

<!-- Um cabeçalho é um dos muitos elementos que o HTML cria. Ele é usado para enfatizar certos textos, tornando-os grandes e em negrito. Por exemplo, o código abaixo cria um cabeçalho: -->

<h1>Este é um cabeçalho</h1>

<!-- A maioria dos elementos HTML consiste em uma tag de abertura e uma tag de fechamento. O navegador precisa de ambas para saber onde o conteúdo começa e termina. O que estiver entre as tags é o conteúdo que será exibido.-->

<!-- <h1> é a tag de abertura e </h1> é a tag de fechamento. A diferença é que as tags de fechamento têm um / após <. -->

<!-- HTML tem 6 tamanhos de cabeçalho, de h1 (maior) a h6 (menor). Vamos criar um <h2>.
Abaixo do cabeçalho h1, crie um cabeçalho h2 digitando <h2>Mimo</h2>. -->

<h2>Mimo</h2>
