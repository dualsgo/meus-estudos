<!-- MIMO 08 - Construindo Listas -->

<!-- 08.2 - Listas não ordenadas -->

<!--
O segundo tipo de lista é uma lista não ordenada. Uma lista não ordenada exibe uma lista de itens com marcadores. Como a barra de navegação de um site.

Para criar uma lista não ordenada, usamos a tag <ul>. O U significa "unordered" e o L significa "list".

Para adicionar um item de lista, colocamos o texto entre as tags <li> e </li>. Assim como os itens de lista de uma lista ordenada.
-->

<h1>Life Goals</h1>
<ul>
    <li>Learn to Code</li>
    <li>Sky dive</li>
    <li>Write a book</li>
    <li>Record an album</li>
</ul>
