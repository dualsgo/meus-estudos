<!-- MIMO 09 - Vinculando Páginas Web -->

<!-- 09.1 - Navegação em Páginas Web -->

 <!--
    Até agora, vimos como criar links para páginas da web em diferentes computadores.

    Podemos acessar páginas da web locais como trail.html adicionando / antes do nome do arquivo, assim como fazemos com imagens locais.
  -->

<!doctype html>
<html>
 <body>
  <h5>History of the American Pioneers</h5>
  <a href="/trail.html">Follow the <strong>trail</strong> by clicking
   here!</a>
 </body>
</html>

<!-- Páginas da web são arquivos .html e a página principal, ou homepage, geralmente é nomeada como index.html. Você pode geralmente ver essa página na barra de pesquisa. -->
 
<!-- Para manter os nomes dos arquivos .html fáceis de ler, colocamos cada palavra em minúsculas e colocamos um hífen - entre elas.
 
Colocamos arquivos .html na mesma pasta. Ligar essas páginas da web locais entre si é como criamos um site.

Os sites geralmente têm links visíveis para suas páginas mais comuns. Aqui, nós linkamos para index.html, glossary.html e contact.html.-->

<!doctype html>
<html>
 <body>
  <h3>Codeopedia</h3>
  <a href="/index.html">Homepage</a>
  <a href="/glossary.html">Glossary</a>
  <a href="/contact.html">Sign Up</a>
  <p>Welcome to Codeopedia! We're a non-profit organization with a
   focus on helping the world learn how to code!</p>
 </body>
</html>
