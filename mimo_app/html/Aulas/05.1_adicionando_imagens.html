<!-- MIMO 05 - Adicionando imagens -->

<!-- 05.1 - Imagens -->

<!-- HTML também nos permite adicionar imagens a uma página da web. Para adicionar imagens a uma página da web, começamos com a tag <img>. -->

<!-- Assim como <br>, <img> é uma tag vazia. Isso significa que não tem uma tag de fechamento. Para exibir uma imagem, uma tag de imagem precisa do atributo src. src significa fonte. Nós definimos a imagem que queremos exibir com um sinal de = e o endereço da imagem entre aspas duplas. -->

<h3>Drawing of <em>Earthrise</em></h3>
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/The_Earth_seen_from_Apollo_17.jpg/1024px-The_Earth_seen_from_Apollo_17.jpg" alt="Earthrise" width="400" height="400">

<!-- Podemos usar atributos para alterar o tamanho das imagens. Os atributos width e height usam pixels como a unidade de medida padrão. -->
