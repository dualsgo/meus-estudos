<!-- MIMO 01 - Noções básicas de HTML -->

<!-- 01.2 - Textos e Títulos -->

<!-- Outro elemento de texto útil em HTML são os parágrafos. Parágrafos são blocos de texto, como este, que ajudam a organizar o conteúdo e a torná-lo mais fácil de ler.-->

<!-- Usamos a tag <p> para adicionar um parágrafo. De forma semelhante aos cabeçalhos, começamos com uma tag de abertura, seguida pelo conteúdo e uma tag de fechamento. -->

<h1>Esse é um título</h1>
<p>Esse é um parágrafo</p>

<!-- Cada elemento <p> criará um novo parágrafo na sua página web. Às vezes, queremos formatar parágrafos com quebras de linha. Por exemplo, esta música ficaria muito melhor se Raindrops on roses aparecesse em uma linha, Whiskers on kittens na próxima, e assim por diante. -->

<h1>My favorite things</h1>
<p> Raindrops on roses<br> Whiskers on kittens<br> Bright copper kettles Warm
 woolen mittens </p>

<!-- <br> é uma tag vazia. Tags vazias não têm tag de fechamento e nem conteúdo. Elas também são chamadas de tags auto-fechadas. -->
